<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
        <title>TransitSJ</title>
        <style>
          * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
          }
          html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
          }
          header {
            display: none;
          }
          body {
            display: flex;
            flex-direction: column;
          }
          main {
            flex: 1;
            position: relative;
            width: 100%;
            height: 100%;
          }
          #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
          }
          footer {
            display: none;
          }
          
          .btn-floating {
            position: fixed;
            z-index: 1000;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            background: #007BFF;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
          }
          .btn-floating:hover {
            background: #0056b3;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
          }
          .btn-floating:active {
            transform: scale(0.9);
          }
          
          #btn-centrar {
            bottom: 88px;
            right: 16px;
          }
          #btn-favs {
            bottom: 16px;
            right: 16px;
          }
          
          .bottom-sheet-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 1100;
            pointer-events: none;
          }
          .bottom-sheet-overlay.active {
            display: block;
          }
          
          .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40vh;
            background: white;
            border-radius: 16px 16px 0 0;
            z-index: 1101;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            box-shadow: 0 -4px 16px rgba(0, 0, 0, 0.1);
            pointer-events: auto;
          }
          .bottom-sheet.active {
            transform: translateY(0);
          }
          .bottom-sheet.dragging {
            transition: none;
          }
          
          .bottom-sheet-header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            border-bottom: 1px solid #e0e0e0;
            background-color: #f8f9fa;
            flex-direction: column;
            gap: 12px;
          }
          .bottom-sheet-header h2 {
            font-size: 18px;
            font-weight: 600;
            margin: 0;
          }
          .bottom-sheet-handle {
            width: 40px;
            height: 4px;
            background: #ccc;
            border-radius: 2px;
            cursor: grab;
            user-select: none;
            flex-shrink: 0;
          }
          .bottom-sheet-handle:active {
            cursor: grabbing;
          }
          
          .bottom-sheet-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
          }
          .bottom-sheet-content ul {
            list-style: none;
            margin: 0;
            padding: 0;
          }
          .bottom-sheet-content li {
            margin-bottom: 12px;
          }
          .bottom-sheet-content button, .bottom-sheet-content .btn-action {
            background: none;
            border: 1px solid #ddd;
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            text-align: left;
            transition: all 0.2s ease;
            font-size: 14px;
          }
          .bottom-sheet-content button:hover, .bottom-sheet-content .btn-action:hover {
            background: #f0f0f0;
            border-color: #007BFF;
          }
          .action-buttons {
            display: flex;
            gap: 12px;
            padding: 0 16px 16px 16px;
          }
          .action-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
          }
          .btn-primary {
            background: #007BFF;
            color: white;
          }
          .btn-primary:hover {
            background: #0056b3;
          }
          .btn-secondary {
            background: #e0e0e0;
            color: #333;
          }
          .btn-secondary:hover {
            background: #d0d0d0;
          }
          
          #contenedor_paradas, #favoritos {
            display: none !important;
          }
          
          @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
          }
        </style>
    </head>
    <body>
        <header>
            <button>Inicio</button>
            <h1>TransitSJ</h1>
        </header>
        <main>
            <div id="map"></div>
            <button id="btn-centrar" class="btn-floating" title="Recentrar ubicación" onclick="Centrar()">📍</button>
            <button id="btn-favs" class="btn-floating" title="Ver favoritos" onclick="abrirBottomSheetFavoritos()">⭐</button>
            
            <div id="bottom-sheet-overlay" class="bottom-sheet-overlay"></div>
            <div id="bottom-sheet" class="bottom-sheet">
                <div class="bottom-sheet-header">
                    <div style="display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%;">
                        <div class="bottom-sheet-handle" id="bs-handle"></div>
                        <button id="bs-fav-btn" type="button" style="background: none; border: none; font-size: 20px; cursor: pointer; padding: 4px; display: none;">⭐</button>
                    </div>
                    <h2 id="bs-title">Contenido</h2>
                </div>
                <div class="bottom-sheet-content" id="bs-content">
                </div>
            </div>
            
            <div id="contenedor_paradas"></div>
            <div id="favoritos" style="display: none;">
                <div id="paradas_favs"></div>
                <div id="lineas_favs"></div>
            </div>
        </main>
        <footer>
            <button onclick="Centrar()">Recentrar</button>
            <button onclick="MostrarFavs()">favoritos</button>
        </footer>
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
        <script src="scripts/script_index.js"></script>
    </body>
</html>

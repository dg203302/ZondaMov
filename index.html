<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
        <title>TransitSJ</title>
        <style>
          * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
          }

          button, a {
            -webkit-tap-highlight-color: transparent;
          }

          a,
          a:visited,
          a:hover,
          a:active {
            color: inherit;
            text-decoration: none;
          }
          html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
          }

          /*
            Glass / transparencia estilo iOS (2026):
            - Por defecto: superficies tipo vidrio con blur + saturate.
            - Al desactivar (clase .no-transparency en <html>): fondos opacos y sin blur.
          */
          :root {
            --glass-blur: 30px;
            --glass-saturate: 185%;
            --glass-border: rgba(255, 255, 255, 0.22);
            --glass-shadow: 0 8px 28px rgba(0, 0, 0, 0.12);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-bg-strong: rgba(255, 255, 255, 0.28);

            --glass-fg: #111;
          }
          .dark-mode {
            --glass-border: rgba(255, 255, 255, 0.14);
            --glass-shadow: 0 12px 38px rgba(0, 0, 0, 0.55);
            --glass-bg: rgba(17, 24, 39, 0.1);
            --glass-bg-strong: rgba(17, 24, 39, 0.28);
            --glass-fg: #e5e7eb;
          }

          /* Si se desactiva la transparencia, se elimina blur y se vuelve opaco */
          .no-transparency {
            --glass-blur: 0px;
            --glass-saturate: 100%;
            --glass-border: rgba(0, 0, 0, 0.08);
            --glass-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            --glass-bg: rgba(255, 255, 255, 0.98);
            --glass-bg-strong: rgba(255, 255, 255, 1);
          }
          .dark-mode.no-transparency {
            --glass-border: rgba(255, 255, 255, 0.10);
            --glass-shadow: 0 8px 24px rgba(0, 0, 0, 0.55);
            --glass-bg: rgba(17, 24, 39, 0.96);
            --glass-bg-strong: rgba(17, 24, 39, 0.98);
          }
          header {
            display: none;
          }
          body {
            display: flex;
            flex-direction: column;
          }
          main {
            flex: 1;
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
          }
          #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            padding-bottom: 0;
          }

          .page-shade {
            position: fixed;
            left: 0;
            width: 100%;
            pointer-events: none;
            z-index: 400;
          }
          .page-shade.top {
            top: 0;
            height: 140px;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.42), rgba(0, 0, 0, 0));
          }
          .page-shade.bottom {
            bottom: 0;
            height: 260px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.42), rgba(0, 0, 0, 0));
          }

          .btn-settings {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 1002;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: none;
            background: var(--glass-bg-strong);
            backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            color: var(--glass-fg);
            font-size: 24px;
            cursor: pointer;
            box-shadow: var(--glass-shadow);
            border: 1px solid var(--glass-border);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            line-height: 0;
          }
          .btn-settings:hover {
            background: var(--glass-bg-strong);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.15);
            transform: scale(1.05);
          }
          .btn-settings:active {
            transform: scale(0.95);
          }

          .sidepanel-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.25);
            z-index: 1200;
          }
          .sidepanel-overlay.active {
            display: block;
          }
          .sidepanel {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: fit-content;
            min-width: 240px;
            max-width: 84vw;
            background: var(--glass-bg-strong);
            z-index: 1201;
            transform: translateX(-100%);
            transition: transform 0.25s ease;
            box-shadow: 8px 0 24px rgba(0, 0, 0, 0.18);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            border-right: 1px solid var(--glass-border);
          }
          .sidepanel.active {
            transform: translateX(0);
          }
          .sidepanel-header {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 16px;
            border-bottom: 1px solid #e0e0e0;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            min-height: 190px;
            flex-direction: column;
            gap: 8px;
            background-image: linear-gradient(to bottom, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.70));
          }
          .transit-logo {
            width: 132px;
            max-width: 70%;
            height: auto;
            object-fit: contain;
            display: block;
            border-radius: 10px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.14);
          }
          .sidepanel-header h1 {
            margin: 0;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.2px;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.18);
          }
          .sidepanel-header h2 {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
          }
          .sidepanel-close {
            background: none;
            border: 1px solid #ddd;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            color: #333;
          }
          .sidepanel-content {
            padding: 16px;
            overflow: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: flex-start;
            flex: 1;
          }

          .sidepanel-sep {
            width: 100%;
            height: 1px;
            background: #e0e0e0;
            opacity: 0.9;
            margin: 12px 0;
          }

          .sidepanel-credits {
            font-size: 13px;
            color: #666;
            line-height: 1.4;
          }
          .sidepanel-credits p {
            margin: 0;
          }

          .sidepanel-footer {
            margin-top: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: flex-start;
          }

          .sidepanel-credits-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #007BFF;
            text-decoration: none;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid rgba(0, 123, 255, 0.2);
          }

          .sidepanel-credits-link img {
            width: 22px;
            height: 22px;
            flex: 0 0 22px;
            object-fit: contain;
            display: block;
            border-radius: 6px;
          }
          .sidepanel-credits-link:hover {
            background: rgba(0, 123, 255, 0.08);
          }

          .toggle-row {
            display: inline-flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 12px;
            border: 1px solid #ddd;
            border-radius: 12px;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
          }
          .toggle-row span {
            font-size: 14px;
            color: #333;
            font-weight: 500;
          }

          .ios-switch {
            position: relative;
            width: 46px;
            height: 28px;
            flex-shrink: 0;
          }
          .ios-switch input {
            position: absolute;
            inset: 0;
            opacity: 0;
            margin: 0;
            cursor: pointer;
          }
          .ios-switch .track {
            position: absolute;
            inset: 0;
            border-radius: 999px;
            background: #e5e7eb;
            border: 1px solid #d1d5db;
            transition: background 0.18s ease, border-color 0.18s ease;
          }
          .ios-switch .track::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.18);
            transition: transform 0.18s ease;
          }
          .ios-switch input:checked + .track {
            background: #007BFF;
            border-color: #007BFF;
          }
          .ios-switch input:checked + .track::after {
            transform: translateX(18px);
          }

          .dark-mode .ios-switch .track {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.18);
          }
          .dark-mode .ios-switch .track::after {
            background: rgba(255, 255, 255, 0.92);
          }

          /* Modo oscuro (mínimo, para superficies principales) */
          .dark-mode body {
            background: #0b1220;
            color: #e5e7eb;
          }
          .dark-mode .btn-settings {
            background: var(--glass-bg-strong);
            border-color: var(--glass-border);
            color: var(--glass-fg);
            box-shadow: var(--glass-shadow);
          }
          .dark-mode .bottom-sheet {
            background: var(--glass-bg-strong);
          }
          .dark-mode .bottom-sheet-header {
            background: rgba(31, 41, 55, 0.95);
            border-bottom-color: rgba(255, 255, 255, 0.08);
          }
          .dark-mode .bottom-sheet-header h2 {
            color: #e5e7eb;
          }
          .dark-mode .bottom-sheet-content button,
          .dark-mode .bottom-sheet-content .btn-action {
            border-color: rgba(255, 255, 255, 0.14);
            color: #e5e7eb;
          }
          .dark-mode .bottom-sheet-content button:hover,
          .dark-mode .bottom-sheet-content .btn-action:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.22);
          }
          .dark-mode .search-bar-container {
            background: var(--glass-bg-strong);
            border-color: var(--glass-border);
            box-shadow: var(--glass-shadow);
          }
          .dark-mode .search-bar {
            color: #e5e7eb;
          }
          .dark-mode .search-bar::placeholder {
            color: rgba(229, 231, 235, 0.65);
          }
          .dark-mode .search-modal-content {
            background: var(--glass-bg-strong);
            border-color: var(--glass-border);
            box-shadow: var(--glass-shadow);
          }
          .dark-mode footer .btn-floating {
            background: var(--glass-bg-strong);
            border-color: var(--glass-border);
            color: var(--glass-fg);
          }
          .dark-mode .sidepanel {
            background: var(--glass-bg-strong);
          }
          .dark-mode .sidepanel-header {
            background: var(--glass-bg);
            border-bottom-color: rgba(255, 255, 255, 0.10);
            background-image: linear-gradient(to bottom, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.70));
          }
          .dark-mode .sidepanel-header h1 {
            color: #e5e7eb;
          }
          .dark-mode .sidepanel-header h2 {
            color: #e5e7eb;
          }
          .dark-mode .toggle-row {
            background: var(--glass-bg);
            border-color: rgba(255, 255, 255, 0.14);
          }
          .dark-mode .toggle-row span {
            color: #e5e7eb;
          }
          .dark-mode .sidepanel-sep {
            background: rgba(255, 255, 255, 0.12);
          }
          .dark-mode .sidepanel-credits {
            color: rgba(229, 231, 235, 0.75);
          }
          .dark-mode .sidepanel-credits-link {
            border-color: rgba(255, 255, 255, 0.14);
            color: #93c5fd;
          }
          .dark-mode .sidepanel-credits-link:hover {
            background: rgba(147, 197, 253, 0.10);
          }

          
          .btn-floating {
            position: fixed;
            z-index: 1000;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            background: #007BFF;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
          }
          .btn-floating:hover {
            background: #0056b3;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
          }
          .btn-floating:active {
            transform: scale(0.9);
          }
          
          .footer-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
          }
          
          footer .btn-floating {
            position: static;
            width: 64px;
            height: 64px;
            font-size: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            border: none;
            background: var(--glass-bg-strong);
            backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            color: var(--glass-fg);
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
          }
          
          footer .btn-floating:hover {
            background: rgba(255, 255, 255, 1);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.15);
            transform: scale(1.05);
          }
          
          footer .btn-floating:active {
            transform: scale(0.95);
          }

          .icon {
            width: 28px;
            height: 28px;
            display: block;
            pointer-events: none;
          }
          .icon.dark {
            display: none;
          }
          .dark-mode .icon.light {
            display: none;
          }
          .dark-mode .icon.dark {
            display: block;
          }
          
          .bottom-sheet-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 1100;
            pointer-events: none;
          }
          .bottom-sheet-overlay.active {
            display: block;
          }
          
          .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40vh;
            background: var(--glass-bg-strong);
            border-radius: 16px 16px 0 0;
            z-index: 1101;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            box-shadow: 0 -4px 16px rgba(0, 0, 0, 0.1);
            pointer-events: auto;
            backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            border: 1px solid var(--glass-border);
            border-bottom: none;
          }
          .bottom-sheet.active {
            transform: translateY(0);
          }
          .bottom-sheet.dragging {
            transition: none !important;
          }
          
          .bottom-sheet-header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            border-bottom: 1px solid #e0e0e0;
            background-color: #f8f9fa;
            flex-direction: column;
            gap: 12px;
          }

          .bs-top-row {
            position: relative;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
          }
          .bs-top-row #bs-plan-btn {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
          }
          .bs-top-row #bs-fav-btn {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
          }
          #bs-plan-btn {
            width: 40px;
            height: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            box-sizing: border-box;
          }
          #bs-fav-btn {
            width: 40px;
            height: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            box-sizing: border-box;
          }

          /* Estado del botón de favoritos del bottom-sheet */
          #bs-fav-btn .fav-state {
            display: inline-flex;
            align-items: center;
            justify-content: center;
          }
          #bs-fav-btn .fav-state.state-added {
            display: none;
          }
          #bs-fav-btn.is-fav .fav-state.state-add {
            display: none;
          }
          #bs-fav-btn.is-fav .fav-state.state-added {
            display: inline-flex;
          }
          .bottom-sheet-header h2 {
            font-size: 18px;
            font-weight: 600;
            margin: 0;
          }
          .bottom-sheet-handle {
            width: 40px;
            height: 4px;
            background: #ccc;
            border-radius: 2px;
            cursor: grab;
            user-select: none;
            flex-shrink: 0;
          }
          .bottom-sheet-handle:active {
            cursor: grabbing;
          }
          
          .bottom-sheet-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
          }
          .bottom-sheet-content ul {
            list-style: none;
            margin: 0;
            padding: 0;
          }
          .bottom-sheet-content li {
            margin-bottom: 12px;
          }
          .bottom-sheet-content button, .bottom-sheet-content .btn-action {
            background: none;
            border: 1px solid #ddd;
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            text-align: left;
            transition: all 0.2s ease;
            font-size: 14px;
          }
          .bottom-sheet-content button:hover, .bottom-sheet-content .btn-action:hover {
            background: #f0f0f0;
            border-color: #007BFF;
          }

          /* Bottom-sheet: Guardar ubicación */
          .save-location-sheet {
            text-align: center;
            padding: 24px;
          }
          .save-location-label {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 16px;
          }
          .save-location-coords {
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 24px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
          }
          .dark-mode .save-location-label {
            color: rgba(229, 231, 235, 0.75);
          }
          .dark-mode .save-location-coords {
            color: rgba(229, 231, 235, 0.60);
          }

          .bottom-sheet-content .btn-save-location {
            width: 100%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px 18px;
            border: none;
            border-radius: 12px;
            background: #007BFF;
            color: #fff;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
          }
          .bottom-sheet-content .btn-save-location:hover {
            background: #0056b3;
            border-color: transparent;
          }
          .bottom-sheet-content .btn-save-location .icon {
            width: 22px;
            height: 22px;
          }

          .bottom-sheet-content .btn-nearest-line {
            margin-top: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-align: center;
            font-weight: 600;
          }
          .bottom-sheet-content .btn-nearest-line .icon {
            width: 22px;
            height: 22px;
          }

          /* Favoritos (filas con botón X integrado) */
          .bottom-sheet-content .fav-empty {
            color: #6b7280;
            font-size: 14px;
            text-align: center;
            margin: 16px 0;
          }
          .bottom-sheet-content .fav-row {
            display: flex;
            align-items: stretch;
            border: 1px solid #ddd;
            border-radius: 10px;
            background: white;
            overflow: hidden;
            margin-bottom: 8px;
            transition: background 0.2s ease, border-color 0.2s ease;
          }
          .bottom-sheet-content .fav-row:hover {
            background: #f0f0f0;
            border-color: #007BFF;
          }
          .bottom-sheet-content .fav-row:focus-within {
            border-color: #007BFF;
          }

          /* Anula el estilo genérico de botones dentro del bottom-sheet */
          .bottom-sheet-content .fav-row .fav-main,
          .bottom-sheet-content .fav-row .btn-eliminar-fav {
            width: auto;
            border: none;
            border-radius: 0;
            background: transparent;
          }
          .bottom-sheet-content .fav-row .fav-main {
            flex: 1;
            padding: 12px 16px;
            cursor: pointer;
            text-align: left;
            font-size: 14px;
            color: inherit;
          }
          .bottom-sheet-content .fav-row .btn-eliminar-fav {
            flex: 0 0 44px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            color: #6b7280;
            border-left: 1px solid rgba(0, 0, 0, 0.08);
            transition: background 0.2s ease, color 0.2s ease;
          }
          .bottom-sheet-content .fav-row .btn-eliminar-fav:hover {
            background: rgba(0, 0, 0, 0.04);
            color: #111827;
          }

          .dark-mode .bottom-sheet-content .fav-empty {
            color: rgba(229, 231, 235, 0.65);
          }
          .dark-mode .bottom-sheet-content .fav-row {
            background: rgba(31, 41, 55, 0.65);
            border-color: rgba(255, 255, 255, 0.12);
          }
          .dark-mode .bottom-sheet-content .fav-row:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(147, 197, 253, 0.35);
          }
          .dark-mode .bottom-sheet-content .fav-row .btn-eliminar-fav {
            border-left-color: rgba(255, 255, 255, 0.10);
            color: rgba(229, 231, 235, 0.70);
          }
          .dark-mode .bottom-sheet-content .fav-row .btn-eliminar-fav:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #e5e7eb;
          }
          .action-buttons {
            display: flex;
            gap: 12px;
            padding: 0 16px 16px 16px;
          }
          .action-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
          }
          .btn-primary {
            background: #007BFF;
            color: white;
          }
          .btn-primary:hover {
            background: #0056b3;
          }
          .btn-secondary {
            background: #e0e0e0;
            color: #333;
          }
          .btn-secondary:hover {
            background: #d0d0d0;
          }
          
          #contenedor_paradas, #favoritos {
            display: none !important;
          }
          
          @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
          }
          
          footer {
            display: flex;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: auto;
            background: transparent;
            padding: 16px;
            gap: 12px;
            align-items: flex-end;
            justify-content: space-between;
            border-top: none;
            box-shadow: none;
            z-index: 500;
            flex-wrap: wrap;
            pointer-events: none;
          }

          /* Escritorio: la barra de búsqueda + botones van arriba en fila */
          @media (min-width: 900px) {
            .btn-settings {
              left: auto;
              right: 16px;
              top: 16px;
              bottom: auto;
            }

            .sidepanel {
              left: auto;
              right: 0;
              transform: translateX(100%);
              box-shadow: -8px 0 24px rgba(0, 0, 0, 0.18);
              border-right: none;
              border-left: 1px solid var(--glass-border);
            }

            footer {
              top: 16px;
              bottom: auto;
              left: 50%;
              transform: translateX(-50%);
              width: min(980px, calc(100% - 220px));
              align-items: center;
              justify-content: center;
              flex-wrap: nowrap;
              gap: 16px;
              padding: 12px 16px;
              z-index: 1003;
            }

            .search-bar-container {
              margin-bottom: 0;
              min-width: 420px;
            }

            .footer-buttons {
              flex-direction: row;
              gap: 12px;
              margin-bottom: 0;
            }
          }

          @media (max-width: 899px) {
            .btn-settings {
              left: 16px;
              right: auto;
              top: auto;
              bottom: 16px;
            }

            .search-bar-container {
              position: fixed;
              top: 16px;
              left: 16px;
              right: 16px;
              min-width: 0;
              margin: 0;
              z-index: 1003;
            }

              position: fixed;
              right: 16px;
              bottom: 16px;
              margin-bottom: 0;
              z-index: 1003;
            }
          }
          
          footer > * {
            pointer-events: auto;
          }
          
          .search-bar-container {
            flex: 1;
            display: flex;
            gap: 8px;
            min-width: 250px;
            margin-bottom: 16px;
            background: var(--glass-bg-strong);
            backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));

            padding: 12px;
            border-radius: 34px;
            box-shadow: var(--glass-shadow);
            border: 1px solid var(--glass-border);
          }
          
          .search-bar {
            flex: 1;
            padding: 14px 18px;
            border: none;
            border-radius: 20px;
            font-size: 16px;
            background: transparent;
            box-shadow: none;
            outline: none;
            transition: all 0.2s ease;
            color: #333;
          }
          .search-bar:focus {
            border: none;
            box-shadow: none;
            background: rgba(255, 255, 255, 0.1);
          }
          .search-bar::placeholder {
            color: #999;
          }
          
          .search-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 1050;
            pointer-events: none;
            flex-direction: column;
            justify-content: flex-start;
            padding-bottom: 0;
          }
          .search-modal.active {
            display: flex;
            pointer-events: auto;
          }
          .search-modal-content {
            background: var(--glass-bg-strong);
            backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            width: 90%;
            max-width: 500px;
            max-height: calc(70vh);
            display: flex;
            flex-direction: column;
            border-radius: 16px;
            box-shadow: var(--glass-shadow);
            border: 1px solid var(--glass-border);
            animation: slideUp 0.3s ease;
            align-self: center;
            margin: 0 auto;
            pointer-events: auto;
          }

          .search-results {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
          }
          .search-results-hint,
          .search-results-loading {
            color: #6b7280;
            text-align: center;
            padding: 20px;
            margin: 0;
            font-size: 14px;
          }
          .search-results-error {
            color: #c00;
            text-align: center;
            padding: 20px;
            margin: 0;
            font-size: 14px;
          }

          .search-result-item {
            width: 100%;
            text-align: left;
            padding: 12px 14px;
            border: none;
            background: transparent;
            cursor: pointer;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
          }
          .search-result-item:hover {
            background: rgba(0, 0, 0, 0.03);
          }
          .search-results .search-result-item:last-child {
            border-bottom: none;
          }
          .search-result-item-title {
            font-weight: 600;
            font-size: 14px;
            color: #111827;
          }
          .search-result-item-info {
            font-size: 12px;
            color: #6b7280;
            margin-top: 4px;
          }

          .dark-mode .search-results-hint,
          .dark-mode .search-results-loading {
            color: rgba(229, 231, 235, 0.70);
          }
          .dark-mode .search-result-item {
            border-bottom-color: rgba(255, 255, 255, 0.10);
          }
          .dark-mode .search-result-item:hover {
            background: rgba(255, 255, 255, 0.06);
          }
          .dark-mode .search-result-item-title {
            color: #e5e7eb;
          }

          /* Ajustes extra para modo sin transparencia: quita blur explícitamente */
          .no-transparency .btn-settings,
          .no-transparency footer .btn-floating,
          .no-transparency .search-bar-container,
          .no-transparency .search-modal-content,
          .no-transparency .bottom-sheet,
          .no-transparency .sidepanel,
          .no-transparency .sidepanel-header,
          .no-transparency .toggle-row {
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
          }
          .dark-mode .search-result-item-info {
            color: rgba(229, 231, 235, 0.70);
          }
          @keyframes slideUp {
            from {
              opacity: 0;
              transform: translateY(10px);
            }
            to {
              opacity: 1;
              transform: translateY(0);
            }
          }

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
        <title>TransitSJ</title>
        <style>
          * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
          }
          html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
          }
          header {
            display: none;
          }
          body {
            display: flex;
            flex-direction: column;
          }
          main {
            flex: 1;
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
          }
          #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            padding-bottom: 0;
          }

          
          .btn-floating {
            position: fixed;
            z-index: 1000;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            background: #007BFF;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
          }
          .btn-floating:hover {
            background: #0056b3;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
          }
          .btn-floating:active {
            transform: scale(0.9);
          }
          
          .footer-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
          }
          
          footer .btn-floating {
            position: static;
            width: 48px;
            height: 48px;
            font-size: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            border: none;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: #333;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
          }
          
          footer .btn-floating:hover {
            background: rgba(255, 255, 255, 1);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.15);
            transform: scale(1.05);
          }
          
          footer .btn-floating:active {
            transform: scale(0.95);
          }
          
          .bottom-sheet-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 1100;
            pointer-events: none;
          }
          .bottom-sheet-overlay.active {
            display: block;
          }
          
          .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40vh;
            background: white;
            border-radius: 16px 16px 0 0;
            z-index: 1101;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            box-shadow: 0 -4px 16px rgba(0, 0, 0, 0.1);
            pointer-events: auto;
          }
          .bottom-sheet.active {
            transform: translateY(0);
          }
          .bottom-sheet.dragging {
            transition: none !important;
          }
          
          .bottom-sheet-header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            border-bottom: 1px solid #e0e0e0;
            background-color: #f8f9fa;
            flex-direction: column;
            gap: 12px;
          }
          .bottom-sheet-header h2 {
            font-size: 18px;
            font-weight: 600;
            margin: 0;
          }
          .bottom-sheet-handle {
            width: 40px;
            height: 4px;
            background: #ccc;
            border-radius: 2px;
            cursor: grab;
            user-select: none;
            flex-shrink: 0;
          }
          .bottom-sheet-handle:active {
            cursor: grabbing;
          }
          
          .bottom-sheet-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
          }
          .bottom-sheet-content ul {
            list-style: none;
            margin: 0;
            padding: 0;
          }
          .bottom-sheet-content li {
            margin-bottom: 12px;
          }
          .bottom-sheet-content button, .bottom-sheet-content .btn-action {
            background: none;
            border: 1px solid #ddd;
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            text-align: left;
            transition: all 0.2s ease;
            font-size: 14px;
          }
          .bottom-sheet-content button:hover, .bottom-sheet-content .btn-action:hover {
            background: #f0f0f0;
            border-color: #007BFF;
          }
          .action-buttons {
            display: flex;
            gap: 12px;
            padding: 0 16px 16px 16px;
          }
          .action-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
          }
          .btn-primary {
            background: #007BFF;
            color: white;
          }
          .btn-primary:hover {
            background: #0056b3;
          }
          .btn-secondary {
            background: #e0e0e0;
            color: #333;
          }
          .btn-secondary:hover {
            background: #d0d0d0;
          }
          
          #contenedor_paradas, #favoritos {
            display: none !important;
          }
          
          @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
          }
          
          .search-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1102;
            flex-direction: column;
          }
          .search-modal.active {
            display: flex;
          }
          .search-modal-content {
            background: white;
            width: 100%;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            border-radius: 0;
          }
          .search-input-area {
            padding: 16px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            gap: 8px;
          }
          .search-input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
          }
          .search-input-area button {
            padding: 12px 16px;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
          }
          .search-results {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
          }
          .search-result-item {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
          }
          .search-result-item:hover {
            background: #f0f0f0;
            border-color: #007BFF;
          }
          .search-result-item-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
          }
          .search-result-item-info {
            font-size: 12px;
            color: #666;
          }
          .search-modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: white;
            border: none;
            font-size: 24px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1103;
          }
          
          footer {
            display: flex;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: auto;
            background: transparent;
            padding: 16px;
            gap: 12px;
            align-items: flex-end;
            justify-content: space-between;
            border-top: none;
            box-shadow: none;
            z-index: 500;
            flex-wrap: wrap;
            pointer-events: none;
          }
          
          footer > * {
            pointer-events: auto;
          }
          
          .search-bar-container {
            flex: 1;
            display: flex;
            gap: 8px;
            min-width: 250px;
            margin-bottom: 16px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 8px;
            border-radius: 28px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
          }
          
          .search-bar {
            flex: 1;
            padding: 10px 14px;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            background: transparent;
            box-shadow: none;
            outline: none;
            transition: all 0.2s ease;
            color: #333;
          }
          .search-bar:focus {
            border: none;
            box-shadow: none;
            background: rgba(255, 255, 255, 0.1);
          }
          .search-bar::placeholder {
            color: #999;
          }
          
          .search-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 498;
            flex-direction: column;
            justify-content: flex-end;
          }
          .search-modal.active {
            display: flex;
          }
          .search-modal-content {
            background: white;
            width: 100%;
            max-height: calc(70vh);
            display: flex;
            flex-direction: column;
            border-radius: 16px 16px 0 0;
            box-shadow: 0 -4px 16px rgba(0, 0, 0, 0.15);
            animation: slideUp 0.3s ease;
          }
          @keyframes slideUp {
            from {
              transform: translateY(100%);
            }
            to {
              transform: translateY(0);
            }
          }
          .search-results {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
          }
          .search-result-item {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
          }
          .search-result-item:hover {
            background: #f0f0f0;
            border-color: #007BFF;
          }
          .search-result-item-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
          }
          .search-result-item-info {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
          }
        </style>
    </head>
    <body>
        <header>
            <button>Inicio</button>
            <h1>TransitSJ</h1>
        </header>
        <main>
            <div id="map"></div>
            
            <div id="search-modal" class="search-modal" onclick="if(event.target.id === 'search-modal') cerrarModalBusqueda()">
                <div class="search-modal-content" onclick="event.stopPropagation()">
                    <div class="search-results" id="search-results">
                        <p style="color: #999; text-align: center; padding: 20px;">Escribe para buscar</p>
                    </div>
                </div>
            </div>
            
            <div id="bottom-sheet-overlay" class="bottom-sheet-overlay" onclick="if(event.target.id === 'bottom-sheet-overlay') cerrarBottomSheet()"></div>
            <div id="bottom-sheet" class="bottom-sheet">
                <div class="bottom-sheet-header">
                    <div style="display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%;">
                        <div class="bottom-sheet-handle" id="bs-handle"></div>
                        <button id="bs-fav-btn" type="button" style="background: none; border: none; font-size: 20px; cursor: pointer; padding: 4px; display: none;">⭐</button>
                    </div>
                    <h2 id="bs-title">Contenido</h2>
                </div>
                <div class="bottom-sheet-content" id="bs-content">
                </div>
            </div>
            
            <div id="contenedor_paradas"></div>
            <div id="favoritos" style="display: none;">
                <div id="paradas_favs"></div>
                <div id="lineas_favs"></div>
                <div id="lugares_favs"></div>
            </div>
        </main>
        <footer>
            <div class="search-bar-container">
                <input type="text" id="search-input" class="search-bar" placeholder="🔍 Buscar..." oninput="buscarLugaresEnTiempoReal()" onkeydown="if(event.key==='Escape') cerrarModalBusqueda()">
            </div>
            <div class="footer-buttons">
                <button id="btn-centrar" class="btn-floating" title="Recentrar ubicación" onclick="CentrarYOferécerGuardar()">📍</button>
                <button id="btn-favs" class="btn-floating" title="Ver favoritos" onclick="abrirBottomSheetFavoritos()">⭐</button>
            </div>
        </footer>
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
        <script src="scripts/script_index.js"></script>
    </body>
</html>
